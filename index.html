<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>ベガス計算機</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN','Yu Gothic',system-ui,sans-serif;
    color: #1a1a1a; background: #F2EEE6; padding: 16px 12px 60px;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  .kicker { font-size: 11px; let-spacing: 3px; color: #9A3B52; font-weight: 700; letter-spacing: 3px; }
  h1 { font-size: 30px; margin: 4px 0 2px; letter-spacing: 1px; }
  .sub { font-size: 13px; color: #555; margin-bottom: 16px; }
  .card { background: #fff; border-radius: 14px; padding: 16px; margin-bottom: 14px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .card-label { font-size: 12px; font-weight: 700; letter-spacing: 1px; color: #888; margin-bottom: 10px; text-transform: uppercase; }
  .player-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .seat-chip { width: 28px; height: 28px; border-radius: 50%; color: #fff; display: grid; place-items: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
  .name-input { flex: 1; border: 1px solid #ddd; border-radius: 8px; padding: 8px 10px; font-size: 16px; }
  .opt { display: flex; align-items: flex-start; gap: 10px; margin-top: 10px; }
  .opt input[type=checkbox] { width: 18px; height: 18px; margin-top: 2px; flex-shrink: 0; }
  .opt-label { font-size: 14px; font-weight: 600; display: block; }
  .opt-hint { font-size: 11px; color: #999; display: block; }
  .point-box { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
  .point-box span { font-size: 14px; color: #555; }
  .num-input { width: 70px; border: 1px solid #ddd; border-radius: 8px; padding: 6px 8px; font-size: 16px; text-align: right; }
  .settings-box { margin-top: 14px; padding-top: 14px; border-top: 1px dashed #ddd; }
  .pts-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .pts-item { display: flex; align-items: center; gap: 4px; }
  .pts-item span { font-size: 13px; color: #555; }
  .pts-input { width: 48px; border: 1px solid #ddd; border-radius: 8px; padding: 5px 6px; font-size: 16px; text-align: right; }
  .hint { font-size: 12px; color: #999; margin: 8px 0; line-height: 1.5; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { color: #888; font-weight: 700; padding: 4px; font-size: 12px; }
  td { padding: 3px 2px; text-align: center; }
  .hole-no { font-weight: 700; color: #555; }
  .par-input { width: 32px; border: 1px solid #eee; border-radius: 6px; padding: 4px 0; text-align: center; font-size: 14px; color: #888; }
  .score-input { width: 42px; border: 2px solid #ddd; border-radius: 8px; padding: 8px 0; text-align: center; font-size: 18px; font-weight: 600; }
  .res { font-size: 14px; white-space: nowrap; }
  .diff-tag { display: block; font-size: 11px; color: #888; font-weight: 600; margin-top: 2px; }
  .sub-row td { padding: 4px 6px 10px; text-align: left; }
  .grp { display: inline-flex; align-items: center; gap: 3px; margin-right: 10px; margin-top: 4px; }
  .grp-label { font-size: 11px; color: #999; margin-right: 2px; }
  .tip-btn { width: 26px; height: 26px; border-radius: 6px; border: 1px solid #ddd; background: #fff; color: #999; font-size: 12px; font-weight: 700; cursor: pointer; padding: 0; }
  .oly-row td { padding: 6px 6px 10px; background: #FCFBF6; text-align: left; }
  .oly-line-label { font-size: 11px; color: #999; margin-bottom: 4px; }
  .oly-player-line { display: flex; align-items: center; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
  .medal-btn { min-width: 30px; height: 28px; border-radius: 7px; border: 1px solid #ddd; background: #fff; color: #aaa; font-size: 12px; font-weight: 700; cursor: pointer; padding: 0 6px; }
  .oly-chip { width: 22px; height: 22px; border-radius: 50%; color: #fff; display: inline-grid; place-items: center; font-weight: 700; font-size: 12px; margin-right: 2px; }
  .total-row { display: flex; align-items: center; gap: 10px; padding: 8px 6px; border-bottom: 1px solid #f2f2f2; }
  .total-name { flex: 1; font-size: 15px; }
  .total-pts { font-weight: 700; font-size: 15px; width: 64px; text-align: right; }
  .total-yen { font-weight: 700; font-size: 15px; width: 96px; text-align: right; }
  .foot { font-size: 11px; color: #aaa; margin-top: 12px; line-height: 1.6; }
  .divider td { text-align: center; font-size: 11px; font-weight: 700; letter-spacing: 1px; color: #9A3B52; padding: 8px 0; background: #F8EFEF; }
  .back-slot { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 130px; }
  .back-slot span { font-size: 11px; color: #888; font-weight: 700; }
  .back-slot select { border: 1px solid #ddd; border-radius: 8px; padding: 8px; font-size: 14px; }
  .version { text-align: center; font-size: 11px; color: #aaa; padding: 10px; }
  .reset-btn { margin-top: 10px; background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 8px 14px; font-size: 13px; color: #9A3B52; cursor: pointer; }
  .stepper { display: inline-flex; align-items: center; gap: 0; }
  .step-btn { width: 40px; height: 40px; border: 1px solid #ccc; background: #fff; font-size: 22px; font-weight: 700; color: #1F6F4A; cursor: pointer; padding: 0; line-height: 1; }
  .step-btn:first-child { border-radius: 8px 0 0 8px; }
  .step-btn:last-child { border-radius: 0 8px 8px 0; }
  .step-val { min-width: 40px; height: 40px; border-top: 1px solid #ccc; border-bottom: 1px solid #ccc; display: inline-flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; }
  .hcp-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .hcp-half { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .hcp-half-label { font-size: 11px; color: #888; font-weight: 700; }
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div class="version" id="version"></div>

<script>
"use strict";
var APP_VERSION = "v1.5 (2026-06-27)";

// ── 定数 ──
var SEAT = ["A","B","C","D"];
var SEAT_COLOR = { A:"#1F6F4A", B:"#C7892C", C:"#3A5BA0", D:"#9A3B52" };
var PAIR_PATTERNS = [ [[0,1],[2,3]], [[0,2],[1,3]], [[0,3],[1,2]] ];
var PAR_DEFAULT = 4;

// コースのパー配列（1〜18番）。宝塚は公式コースガイドより。
var COURSE_PRESETS = [
  { id:"takarazuka_old", name:"宝塚ゴルフ倶楽部（旧）",
    pars:[4,3,4,5,5,3,4,3,4, 3,4,3,4,5,4,3,5,4],   // 計70
    hp:  [9,13,1,7,5,17,3,15,11, 14,6,18,10,4,2,16,8,12] },
  { id:"takarazuka_new", name:"宝塚ゴルフ倶楽部（新）",
    pars:[5,4,3,5,4,4,3,4,4, 5,4,3,4,4,3,4,5,4],    // 計72
    hp:  [7,13,15,3,9,1,17,5,11, 14,10,18,6,2,16,4,12,8] }
];
var TIP_ITEMS = [
  { key:"birdie", label:"バーディー", auto:true,  def:1 },
  { key:"nearpin", label:"ニアピン",  auto:false, def:1 },
  { key:"sunaichi",label:"砂一",      auto:false, def:1 },
  { key:"imo",     label:"イモ",      auto:false, def:1, negative:true }
];
var OLY_MEDALS = [
  { key:"gold",  label:"金", color:"#C9A227", def:5 },
  { key:"silver",label:"銀", color:"#9098A1", def:4 },
  { key:"bronze",label:"銅", color:"#A9712E", def:3 },
  { key:"iron",  label:"鉄", color:"#5B6066", def:2 }
];

function pairingForHole(holeNo, splitBack) {
  var local = (splitBack && holeNo >= 10) ? (holeNo - 10) : (holeNo - 1);
  var block = Math.floor(local / 3) % 3;
  return PAIR_PATTERNS[block];
}
function vegasNumber(s1, s2, highFirst) {
  var lo = Math.min(s1,s2), hi = Math.max(s1,s2);
  return highFirst ? (hi*10+lo) : (lo*10+hi);
}

// ── 状態 ──
var S = {
  names: ["","","",""],
  pointValue: 100,
  highFirst: false,
  flip: false,
  roundUp5: false,
  splitBack: false,
  backOrder: [0,1,2,3],
  tipOn: true,
  olyOn: true,
  courseId: "takarazuka_old",  // 既定コース
  hcpOn: false,                // ハンディキャップ機能
  hcpFront: [0,0,0,0],         // 各自の前半ハンデ数
  hcpBack:  [0,0,0,0],         // 各自の後半ハンデ数
  hp: [],                      // 現在コースのHP配列(1〜18)
  tipPts: {}, 
  olyPts: {},
  olyChipinPts: { offGreen:5, onePutt:4 },
  olyBonus: { allMedals:3, allChipin:10 },
  scores: [],   // [18][4]
  pars: [],     // [18]
  tips: [],     // [18] {nearpin,sunaichi,imo}
  oly: []       // [18] {medals:{}, offGreen:[], goldOnePutt:bool}
};

// 手入力で追加したコースを保存・読み込み（ブラウザに記憶）
function loadCustomCourses(){
  try { return JSON.parse(localStorage.getItem("vegas_custom_courses")||"[]"); }
  catch(e){ return []; }
}
function saveCustomCourses(list){
  try { localStorage.setItem("vegas_custom_courses", JSON.stringify(list)); } catch(e){}
}
var CUSTOM_COURSES = loadCustomCourses();

function allCourses(){ return COURSE_PRESETS.concat(CUSTOM_COURSES); }
function findCourse(id){
  var all = allCourses();
  for (var i=0;i<all.length;i++){ if (all[i].id===id) return all[i]; }
  return null;
}
function applyCoursePars(id){
  var c = findCourse(id);
  if (c && c.pars && c.pars.length===18){
    for (var h=0; h<18; h++){ S.pars[h] = c.pars[h]; }
  }
  // HP（ホールハンディ）。無いコースは18通しの仮データ（パー難易度ではなく順番）
  S.hp = (c && c.hp && c.hp.length===18) ? c.hp.slice() : null;
}
TIP_ITEMS.forEach(function(t){ S.tipPts[t.key] = t.def; });
OLY_MEDALS.forEach(function(m){ S.olyPts[m.key] = m.def; });
for (var i=0;i<18;i++){
  S.scores.push(["","","",""]);
  S.pars.push(PAR_DEFAULT);
  S.tips.push({ nearpin:null, sunaichi:null, imo:null });
  var medals = {};
  OLY_MEDALS.forEach(function(m){ medals[m.key]=null; });
  S.oly.push({ medals:medals, offGreen:[], goldOnePutt:false });
}
applyCoursePars(S.courseId);

function seatPlayersForHole(holeNo){
  if (S.splitBack && holeNo >= 10) return S.backOrder;
  return [0,1,2,3];
}

// 各プレーヤーが各ホールで受けるハンデ打数を計算（前半・後半それぞれ HP の小さい順）
// 返り値: strokeMap[player][holeIdx] = 0 or 1
function computeStrokeMap(){
  var map = [[],[],[],[]];
  for (var p=0;p<4;p++){ for (var h=0;h<18;h++){ map[p][h]=0; } }
  if (!S.hcpOn || !S.hp) return map;
  // 前半(0-8)と後半(9-17)で別々に配分
  var halves = [ {holes:[0,1,2,3,4,5,6,7,8], hcp:S.hcpFront},
                 {holes:[9,10,11,12,13,14,15,16,17], hcp:S.hcpBack} ];
  halves.forEach(function(half){
    // そのハーフのホールを HP 昇順に並べる
    var sorted = half.holes.slice().sort(function(a,b){ return S.hp[a]-S.hp[b]; });
    for (var p=0;p<4;p++){
      var n = half.hcp[p]||0;
      for (var k=0; k<n && k<sorted.length; k++){
        map[p][sorted[k]] = 1;
      }
    }
  });
  return map;
}

// 1ホールのベガス計算（hcpを効かせたネットスコアで数字を作る）
var _strokeMapCache = null;
function getStrokeMap(){ if(!_strokeMapCache) _strokeMapCache = computeStrokeMap(); return _strokeMapCache; }

function computeHole(h){
  var holeNo = h+1;
  var row = S.scores[h];
  for (var k=0;k<4;k++){ if (row[k]==="" || row[k]==null) return null; }
  var seatMap = seatPlayersForHole(holeNo);
  var pairing = pairingForHole(holeNo, S.splitBack);
  var par = S.pars[h];
  var sm = getStrokeMap();
  // ネットスコア（ハンデ打数を引く。最低1）
  var net = [0,1,2,3].map(function(p){ return Math.max(1, row[p] - sm[p][h]); });
  var sides = pairing.map(function(sp){ return sp.map(function(si){ return seatMap[si]; }); });
  var sideNums = sides.map(function(pl){
    var s1=net[pl[0]], s2=net[pl[1]];
    return { players:pl, num:vegasNumber(s1,s2,S.highFirst), s1:s1, s2:s2 };
  });
  if (S.flip){
    var hasBirdie = sides.map(function(pl){ return pl.some(function(p){ return net[p] <= par-1; }); });
    sideNums.forEach(function(sn,idx){
      var opp = idx===0?1:0;
      if (hasBirdie[opp]) sn.num = vegasNumber(sn.s1, sn.s2, !S.highFirst);
    });
  }
  var diff = sideNums[0].num - sideNums[1].num;
  if (S.roundUp5 && diff!==0){
    var sign = diff<0?-1:1;
    diff = sign * Math.ceil(Math.abs(diff)/5) * 5;
  }
  return { sideNums:sideNums, diff:diff, par:par, holeNo:holeNo };
}

// 全体集計
function computeTotals(){
  var pts=[0,0,0,0];
  for (var h=0; h<18; h++){
    var res = computeHole(h);
    if (res){
      res.sideNums[0].players.forEach(function(p){ pts[p] += -res.diff; });
      res.sideNums[1].players.forEach(function(p){ pts[p] += res.diff; });
    }
    if (S.tipOn){
      var par = S.pars[h], row = S.scores[h];
      var filled = true;
      for (var k=0;k<4;k++){ if (row[k]===""||row[k]==null) filled=false; }
      if (filled){
        row.forEach(function(v,p){
          if (v <= par-1){
            pts[p] += S.tipPts.birdie*3;
            [0,1,2,3].forEach(function(q){ if(q!==p) pts[q]-=S.tipPts.birdie; });
          }
        });
      }
      ["nearpin","sunaichi","imo"].forEach(function(key){
        var w = S.tips[h][key];
        if (w!=null){
          var neg = TIP_ITEMS.filter(function(t){return t.key===key;})[0].negative;
          var sign = neg?-1:1;
          pts[w] += sign*S.tipPts[key]*3;
          [0,1,2,3].forEach(function(q){ if(q!==w) pts[q]-=sign*S.tipPts[key]; });
        }
      });
    }
    if (S.olyOn){
      var orow = S.oly[h];
      var award = function(w,pt){
        if (w==null||!pt) return;
        pts[w]+=pt*3;
        [0,1,2,3].forEach(function(q){ if(q!==w) pts[q]-=pt; });
      };
      OLY_MEDALS.forEach(function(m){ award(orow.medals[m.key], S.olyPts[m.key]); });
      orow.offGreen.forEach(function(p){ award(p, S.olyChipinPts.offGreen); });
      if (orow.goldOnePutt) award(orow.medals.gold, S.olyChipinPts.onePutt);
      var allA = OLY_MEDALS.every(function(m){ return orow.medals[m.key]!=null; });
      if (allA) award(orow.medals.gold, S.olyBonus.allMedals);
      var allC = allA && OLY_MEDALS.every(function(m){ return orow.offGreen.indexOf(orow.medals[m.key])!==-1; });
      if (allC) award(orow.medals.gold, S.olyBonus.allChipin);
    }
  }
  return pts;
}

// ── 操作 ──
function setScore(h,p,v){
  var n = v===""? "" : Math.max(1, parseInt(v,10)||0);
  S.scores[h][p]=n; render();
}
function setOlyMedal(h,key,player){
  var m = S.oly[h].medals;
  if (m[key]===player){ m[key]=null; if(key==="gold") S.oly[h].goldOnePutt=false; }
  else {
    OLY_MEDALS.forEach(function(md){ if(m[md.key]===player) m[md.key]=null; });
    m[key]=player;
  }
  render();
}
function toggleOffGreen(h,player){
  var arr=S.oly[h].offGreen; var i=arr.indexOf(player);
  if (i===-1) arr.push(player); else arr.splice(i,1);
  render();
}
function toggleGoldOnePutt(h){
  if (S.oly[h].medals.gold!=null) S.oly[h].goldOnePutt=!S.oly[h].goldOnePutt;
  render();
}
function setTip(h,key,player){
  S.tips[h][key] = (S.tips[h][key]===player)?null:player; render();
}
function resetAll(){
  if (!confirm("全スコアと記録をリセットします。よろしいですか？")) return;
  for (var h=0;h<18;h++){
    S.scores[h]=["","","",""]; S.pars[h]=PAR_DEFAULT;
    S.tips[h]={nearpin:null,sunaichi:null,imo:null};
    var medals={}; OLY_MEDALS.forEach(function(m){medals[m.key]=null;});
    S.oly[h]={medals:medals,offGreen:[],goldOnePutt:false};
  }
  render();
}

function dispName(i){ return S.names[i] || (SEAT[i]+" ("+(i+1)+"番手)"); }

// 新しいゴルフ場を手入力で登録
function addCustomCourse(){
  var name = prompt("ゴルフ場名を入力してください（例：芦屋カンツリー）");
  if (!name){ render(); return; }
  var def = "4,4,4,3,5,4,3,4,4,4,4,4,3,5,4,3,4,4";
  var input = prompt(
    "1番〜18番のパーを、カンマ区切りで18個入力してください。\n例）" + def,
    def
  );
  if (!input){ render(); return; }
  var parts = input.split(/[,\s、]+/).map(function(x){ return parseInt(x,10); }).filter(function(x){ return !isNaN(x); });
  if (parts.length !== 18){
    alert("パーは18個必要です。入力された数: " + parts.length + "個。もう一度お試しください。");
    render(); return;
  }
  var id = "custom_" + Date.now();
  var course = { id:id, name:name + "（手入力）", pars:parts };
  CUSTOM_COURSES.push(course);
  saveCustomCourses(CUSTOM_COURSES);
  S.courseId = id;
  applyCoursePars(id);
  render();
}

// ── 描画ヘルパ ──
function el(tag, attrs, children){
  var e = document.createElement(tag);
  if (attrs) for (var k in attrs){
    if (k==="class") e.className=attrs[k];
    else if (k==="style") e.style.cssText=attrs[k];
    else if (k.slice(0,2)==="on") e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else if (k==="value") e.value=attrs[k];
    else if (k==="checked") { if(attrs[k]) e.setAttribute("checked","checked"); e.checked=attrs[k]; }
    else e.setAttribute(k, attrs[k]);
  }
  if (children!=null){
    (Array.isArray(children)?children:[children]).forEach(function(c){
      if (c==null||c===false) return;
      e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
    });
  }
  return e;
}
function toggle(label, key, hint){
  return el("label",{class:"opt"},[
    el("input",{type:"checkbox", checked:S[key], onchange:function(ev){ S[key]=ev.target.checked; render(); }}),
    el("span",null,[ el("span",{class:"opt-label"},label), hint?el("span",{class:"opt-hint"},hint):null ])
  ]);
}
// −/＋ で増減するステッパー（min..max）
function stepper(getv, setv, min, max){
  var box = el("div",{class:"stepper"});
  var minus = el("button",{class:"step-btn", onclick:function(){
    var v=getv(); if(v>min){ setv(v-1); render(); }
  }},"−");
  var val = el("span",{class:"step-val"}, String(getv()));
  var plus = el("button",{class:"step-btn", onclick:function(){
    var v=getv(); if(v<max){ setv(v+1); render(); }
  }},"＋");
  box.appendChild(minus); box.appendChild(val); box.appendChild(plus);
  return box;
}
function ptsField(label, getv, setv){
  return el("div",{class:"pts-item"},[
    el("span",null,label),
    el("input",{type:"number", class:"pts-input", value:getv(), oninput:function(ev){ setv(parseInt(ev.target.value,10)||0); render(); }}),
    el("span",null,"点")
  ]);
}

// ── メイン描画 ──
function render(){
  _strokeMapCache = null;  // ハンデ設定変更を反映
  var app = document.getElementById("app");
  app.innerHTML="";
  document.getElementById("version").textContent = "ベガス計算機 "+APP_VERSION;

  // ヘッダ
  app.appendChild(el("div",null,[
    el("div",{class:"kicker"},"LAS VEGAS · チーム戦スコア"),
    el("h1",null,"ベガス計算機"),
    el("div",{class:"sub"},"3ホールごとにペアが入れ替わる集計アプリ")
  ]));

  // 設定カード
  var setCard = el("div",{class:"card"});
  setCard.appendChild(el("div",{class:"card-label"},"プレーヤー（前半の打順）"));
  SEAT.forEach(function(s,i){
    setCard.appendChild(el("div",{class:"player-row"},[
      el("span",{class:"seat-chip", style:"background:"+SEAT_COLOR[s]}, s),
      el("input",{class:"name-input", value:S.names[i], placeholder:(i+1)+"番手の名前",
        oninput:function(ev){ S.names[i]=ev.target.value; }})
    ]));
  });

  // コース選択
  var courseBox = el("div",{class:"settings-box"});
  courseBox.appendChild(el("div",{class:"card-label"},"コース（各ホールのパー）"));
  var sel = el("select",{ style:"width:100%;border:1px solid #ddd;border-radius:8px;padding:10px;font-size:15px;",
    onchange:function(ev){
      var v = ev.target.value;
      if (v==="__add__"){ addCustomCourse(); return; }
      S.courseId = v; applyCoursePars(v); render();
    }});
  allCourses().forEach(function(c){
    var o = el("option",{value:c.id}, c.name);
    if (S.courseId===c.id) o.selected=true;
    sel.appendChild(o);
  });
  // 手入力（カスタム）
  var optCustom = el("option",{value:"__custom__"}, "手入力（下のパー欄で調整）");
  if (S.courseId==="__custom__") optCustom.selected=true;
  sel.appendChild(optCustom);
  sel.appendChild(el("option",{value:"__add__"}, "＋ 新しいゴルフ場を登録…"));
  courseBox.appendChild(sel);
  courseBox.appendChild(el("div",{class:"hint"},"コースを選ぶと各ホールのパーが入ります。スコア表のパー欄で個別に直すこともできます。"));
  setCard.appendChild(courseBox);

  setCard.appendChild(toggle("数字は大きい順（4と5→54）","highFirst","オフなら 4と5→45"));
  setCard.appendChild(toggle("バーディフリップ","flip","バーディが出た側は相手の数字を逆転"));
  setCard.appendChild(toggle("点差を5単位で切り上げ","roundUp5","差1〜5→5、6〜10→10、11〜15→15…"));
  setCard.appendChild(toggle("後半で組み合わせを仕切り直す","splitBack","10番から新しい打順で再スタート"));
  setCard.appendChild(toggle("チップ（バーディー等）を有効にする","tipOn","出した人が他の3人から受け取る"));
  setCard.appendChild(toggle("オリンピックを有効にする","olyOn","ワンオンを最初に乗った位置の遠い順に金銀銅鉄"));
  setCard.appendChild(toggle("ハンディキャップを効かせる","hcpOn","各自のハーフごとのハンデ数を入力（上手い人は0）"));
  if (S.hcpOn){
    var hcpBox = el("div",{class:"settings-box"});
    hcpBox.appendChild(el("div",{class:"card-label"},"各自のハンデ（ハーフごと）"));
    if (!S.hp){
      hcpBox.appendChild(el("div",{class:"hint", style:"color:#9A3B52"},"このコースはHP（ホールハンディ）が未登録のため、ハンデを正しく配分できません。宝塚（旧・新）を選ぶか、コース登録時にHPを入れてください。"));
    }
    [0,1,2,3].forEach(function(p){
      var row = el("div",{class:"hcp-row"});
      row.appendChild(el("span",{class:"seat-chip", style:"background:"+SEAT_COLOR[SEAT[p]]}, SEAT[p]));
      row.appendChild(el("span",{style:"flex:1;min-width:70px;font-size:14px"}, dispName(p)));
      row.appendChild(el("div",{class:"hcp-half"},[
        el("span",{class:"hcp-half-label"},"前半"),
        stepper((function(pp){return function(){return S.hcpFront[pp];};})(p),
                (function(pp){return function(v){S.hcpFront[pp]=v;};})(p), 0, 9)
      ]));
      row.appendChild(el("div",{class:"hcp-half"},[
        el("span",{class:"hcp-half-label"},"後半"),
        stepper((function(pp){return function(){return S.hcpBack[pp];};})(p),
                (function(pp){return function(v){S.hcpBack[pp]=v;};})(p), 0, 9)
      ]));
      hcpBox.appendChild(row);
    });
    hcpBox.appendChild(el("div",{class:"hint"},"ハンデを受ける人は、そのハーフのHPが小さいホールから順に1打引いた『ネット』でベガスを計算します。例：前半3なら前半のHP1・2・3のホールで各1打。"));
    setCard.appendChild(hcpBox);
  }
  setCard.appendChild(el("div",{class:"point-box"},[
    el("span",null,"1点あたり"),
    el("input",{type:"number", class:"num-input", value:S.pointValue, oninput:function(ev){ S.pointValue=parseInt(ev.target.value,10)||0; render(); }}),
    el("span",null,"円")
  ]));

  // チップ点数設定
  if (S.tipOn){
    var tipBox = el("div",{class:"settings-box"});
    tipBox.appendChild(el("div",{class:"card-label"},"チップの点数（1口あたり）"));
    var tr = el("div",{class:"pts-row"});
    TIP_ITEMS.forEach(function(t){
      tr.appendChild(ptsField(t.label, function(){return S.tipPts[t.key];}, function(v){S.tipPts[t.key]=v;}));
    });
    tipBox.appendChild(tr);
    tipBox.appendChild(el("div",{class:"hint"},"バーディーはスコアから自動判定。ニアピン・砂一は表でタップ。イモは罰として本人が他3人へ支払います。"));
    setCard.appendChild(tipBox);
  }

  // オリンピック設定
  if (S.olyOn){
    var olyBox = el("div",{class:"settings-box"});
    olyBox.appendChild(el("div",{class:"card-label"},"オリンピックの点数（1口あたり）"));
    var or1 = el("div",{class:"pts-row"});
    OLY_MEDALS.forEach(function(m){
      or1.appendChild(el("div",{class:"pts-item"},[
        el("span",{class:"oly-chip", style:"background:"+m.color}, m.label),
        el("input",{type:"number", class:"pts-input", value:S.olyPts[m.key], oninput:(function(mm){return function(ev){ S.olyPts[mm.key]=parseInt(ev.target.value,10)||0; render(); };})(m)}),
        el("span",null,"点")
      ]));
    });
    olyBox.appendChild(or1);
    var or2 = el("div",{class:"pts-row", style:"margin-top:10px"});
    or2.appendChild(ptsField("グリーン外チップイン", function(){return S.olyChipinPts.offGreen;}, function(v){S.olyChipinPts.offGreen=v;}));
    or2.appendChild(ptsField("金(最遠)が1パット", function(){return S.olyChipinPts.onePutt;}, function(v){S.olyChipinPts.onePutt=v;}));
    olyBox.appendChild(or2);
    var or3 = el("div",{class:"pts-row", style:"margin-top:10px"});
    or3.appendChild(ptsField("金銀銅鉄 揃いボーナス", function(){return S.olyBonus.allMedals;}, function(v){S.olyBonus.allMedals=v;}));
    or3.appendChild(ptsField("全チップイン ボーナス", function(){return S.olyBonus.allChipin;}, function(v){S.olyBonus.allChipin=v;}));
    olyBox.appendChild(or3);
    olyBox.appendChild(el("div",{class:"hint"},"金銀銅鉄＝ワンオンした人を最初に乗った位置が遠い順に割当。グリーン外から直接入れたら⛳直入れ。金が最遠から1パットで沈めたら1パットをタップ。各賞とも取った人が他3人から受け取ります。"));
    setCard.appendChild(olyBox);
  }

  // 後半打順
  if (S.splitBack){
    var bo = el("div",{class:"settings-box"});
    bo.appendChild(el("div",{class:"card-label"},"後半（10番〜）の打順"));
    bo.appendChild(el("div",{class:"hint"},"後半1番手→2番手→…の順に、誰が打つか選んでください"));
    var bor = el("div",{class:"pts-row"});
    [0,1,2,3].forEach(function(slot){
      var sel = el("select",{ onchange:(function(sl){return function(ev){
        var v=parseInt(ev.target.value,10);
        var old=S.backOrder[sl]; var swapAt=S.backOrder.indexOf(v);
        S.backOrder[sl]=v; if(swapAt!==-1) S.backOrder[swapAt]=old;
        render();
      };})(slot)});
      [0,1,2,3].forEach(function(pi){
        var o=el("option",{value:pi}, dispName(pi));
        if (S.backOrder[slot]===pi) o.selected=true;
        sel.appendChild(o);
      });
      bor.appendChild(el("div",{class:"back-slot"},[ el("span",null,(slot+1)+"番手"), sel ]));
    });
    bo.appendChild(bor);
    setCard.appendChild(bo);
  }
  app.appendChild(setCard);

  // スコア表
  var scCard = el("div",{class:"card"});
  scCard.appendChild(el("div",{class:"card-label"},"スコア入力"));
  var table = el("table");
  var thead = el("tr",null,[
    el("th",null,"H"), el("th",null,"Par"),
    el("th",null,el("span",{class:"oly-chip",style:"background:"+SEAT_COLOR.A},"A")),
    el("th",null,el("span",{class:"oly-chip",style:"background:"+SEAT_COLOR.B},"B")),
    el("th",null,el("span",{class:"oly-chip",style:"background:"+SEAT_COLOR.C},"C")),
    el("th",null,el("span",{class:"oly-chip",style:"background:"+SEAT_COLOR.D},"D")),
    el("th",null,"ペア / 差")
  ]);
  table.appendChild(el("thead",null,thead));
  var tbody = el("tbody");

  for (var h=0; h<18; h++){
    (function(h){
      var holeNo=h+1;
      var res=computeHole(h);
      var pairing=pairingForHole(holeNo,S.splitBack);
      var seatMap=seatPlayersForHole(holeNo);

      if (S.splitBack && holeNo===10){
        tbody.appendChild(el("tr",{class:"divider"}, el("td",{colspan:7},"後半スタート — 打順 仕切り直し")));
      }

      // ペア明示（緑チーム vs 赤チーム）
      // pairing[0]=緑side, pairing[1]=赤side（seatインデックス）。seatMapで実プレーヤーへ
      var greenPlayers = pairing[0].map(function(si){ return seatMap[si]; });
      var redPlayers   = pairing[1].map(function(si){ return seatMap[si]; });
      var shortName = function(p){
        var nm = S.names[p];
        if (nm){ return nm.length>4 ? nm.slice(0,4) : nm; }
        return SEAT[p];
      };
      var pairTd = el("td",{colspan:7, style:"text-align:left;padding:6px 6px 2px;font-size:12px;font-weight:700"},[
        el("span",{style:"color:#1F6F4A"}, "緑 "+greenPlayers.map(shortName).join("＋")),
        el("span",{style:"color:#aaa;font-weight:400"}, "  vs  "),
        el("span",{style:"color:#9A3B52"}, "赤 "+redPlayers.map(shortName).join("＋"))
      ]);
      tbody.appendChild(el("tr", null, pairTd));

      var smRow = getStrokeMap();
      var scoreCells=[0,1,2,3].map(function(p){
        var seatIdx=seatMap.indexOf(p);
        var sideOf=-1;
        pairing.forEach(function(sp,si){ if(sp.indexOf(seatIdx)!==-1) sideOf=si; });
        var hasStroke = S.hcpOn && smRow[p][h]>0;
        var inputEl = el("input",{
          class:"score-input", inputmode:"numeric", value:S.scores[h][p],
          style:"border-color:"+(sideOf===0?"#1F6F4A":"#9A3B52"),
          oninput:(function(pp){return function(ev){ setScore(h,pp,ev.target.value); };})(p)
        });
        var cellChildren = [inputEl];
        if (hasStroke){
          cellChildren.push(el("div",{style:"font-size:10px;color:#9A3B52;font-weight:700;margin-top:1px"},"▲ハンデ1"));
        }
        return el("td",null, cellChildren);
      });

      var resCell;
      if (res){
        var tag = res.diff===0?"±0":(res.diff<0?("緑+"+(-res.diff)):("赤+"+res.diff));
        resCell = el("td",{class:"res"},[
          el("b",{style:"color:#1F6F4A"}, String(res.sideNums[0].num)),
          document.createTextNode(" : "),
          el("b",{style:"color:#9A3B52"}, String(res.sideNums[1].num)),
          el("span",{class:"diff-tag"}, tag)
        ]);
      } else {
        resCell = el("td",{class:"res", style:"color:#ccc"},"—");
      }

      tbody.appendChild(el("tr",null,[
        el("td",{class:"hole-no"}, String(holeNo)),
        el("td",null, el("input",{class:"par-input", value:S.pars[h], oninput:function(ev){ S.pars[h]=parseInt(ev.target.value,10)||PAR_DEFAULT; S.courseId="__custom__"; render(); }})),
        scoreCells[0],scoreCells[1],scoreCells[2],scoreCells[3],
        resCell
      ]));

      // チップ行
      if (S.tipOn){
        var tipTd = el("td",{colspan:7});
        ["nearpin","sunaichi","imo"].forEach(function(key){
          var item = TIP_ITEMS.filter(function(t){return t.key===key;})[0];
          var grp = el("span",{class:"grp"});
          grp.appendChild(el("span",{class:"grp-label", style: item.negative?"color:#9A3B52;font-weight:700":""}, item.label+(item.negative?"(罰)":"")));
          [0,1,2,3].forEach(function(p){
            var active = S.tips[h][key]===p;
            grp.appendChild(el("button",{
              class:"tip-btn",
              style: active?("background:"+SEAT_COLOR[SEAT[p]]+";color:#fff;border-color:"+SEAT_COLOR[SEAT[p]]):"",
              onclick:(function(kk,pp){return function(){ setTip(h,kk,pp); };})(key,p)
            }, SEAT[p]));
          });
          tipTd.appendChild(grp);
        });
        tbody.appendChild(el("tr",{class:"sub-row"}, tipTd));
      }

      // オリンピック行
      if (S.olyOn){
        var olyTd = el("td",{colspan:7});
        olyTd.appendChild(el("div",{class:"oly-line-label"},"オリンピック — 各人のメダル（最初に乗った位置が遠い順）"));
        [0,1,2,3].forEach(function(p){
          var line = el("div",{class:"oly-player-line"});
          line.appendChild(el("span",{class:"oly-chip", style:"background:"+SEAT_COLOR[SEAT[p]]}, SEAT[p]));
          OLY_MEDALS.forEach(function(m){
            var active = S.oly[h].medals[m.key]===p;
            line.appendChild(el("button",{
              class:"medal-btn",
              style: active?("background:"+m.color+";color:#fff;border-color:"+m.color):"",
              onclick:(function(mm,pp){return function(){ setOlyMedal(h,mm.key,pp); };})(m,p)
            }, m.label));
          });
          // 金の人だけ1パット
          if (S.oly[h].medals.gold===p){
            var on=S.oly[h].goldOnePutt;
            line.appendChild(el("button",{
              class:"medal-btn",
              style: on?"background:#C9A227;color:#fff;border-color:#C9A227":"",
              onclick:function(){ toggleGoldOnePutt(h); }
            },"1パット"));
          }
          // グリーン外チップイン
          var og = S.oly[h].offGreen.indexOf(p)!==-1;
          line.appendChild(el("button",{
            class:"medal-btn",
            style: og?"background:#1F6F4A;color:#fff;border-color:#1F6F4A":"",
            onclick:(function(pp){return function(){ toggleOffGreen(h,pp); };})(p)
          },"⛳直入れ"));
          olyTd.appendChild(line);
        });
        tbody.appendChild(el("tr",{class:"oly-row"}, olyTd));
      }
    })(h);
  }
  table.appendChild(tbody);
  scCard.appendChild(table);
  app.appendChild(scCard);

  // 精算
  var totals = computeTotals();
  var sumCard = el("div",{class:"card"});
  sumCard.appendChild(el("div",{class:"card-label"},"精算"));
  [0,1,2,3].forEach(function(i){
    var pt=totals[i], yen=pt*S.pointValue;
    var col = pt>0?"#1F6F4A":(pt<0?"#9A3B52":"#777");
    var ycol = yen>0?"#1F6F4A":(yen<0?"#9A3B52":"#777");
    sumCard.appendChild(el("div",{class:"total-row"},[
      el("span",{class:"seat-chip", style:"background:"+SEAT_COLOR[SEAT[i]]}, SEAT[i]),
      el("span",{class:"total-name"}, dispName(i)),
      el("span",{class:"total-pts", style:"color:"+col}, (pt>0?"+":"")+pt+"点"),
      el("span",{class:"total-yen", style:"color:"+ycol}, (yen>0?"+":"")+yen.toLocaleString()+"円")
    ]));
  });
  sumCard.appendChild(el("div",{class:"foot"},"点数が小さいサイドの勝ち。差の点数を負けサイドの各人が勝ちサイドの各人へ支払います。全項目を合算して常にゼロサムになります。"));
  sumCard.appendChild(el("button",{class:"reset-btn", onclick:resetAll},"全リセット"));
  app.appendChild(sumCard);
}

render();
</script>
</body>
</html>
